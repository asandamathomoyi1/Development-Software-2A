<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Digital Mental Health Platform</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <style>
            :root {
                /* === BLUE THEME === */
                --bg-deep:       #0a1428;
                --bg-mid:        #0f1b3c;
                --bg-surface:    #1a2a5c;

                --glass-bg:      rgba(15, 40, 100, 0.5);
                --glass-bg-2:    rgba(10, 25, 80, 0.65);
                --glass-bg-light:rgba(25, 70, 150, 0.35);
                --glass-border:  rgba(96, 165, 250, 0.25);
                --glass-border-2:rgba(96, 165, 250, 0.15);
                --glass-shine:   rgba(191, 219, 254, 0.08);

                --aurora-1: #3b82f6;   /* primary blue */
                --aurora-2: #1e40af;   /* dark blue */
                --aurora-3: #2563eb;   /* medium blue */
                --aurora-4: #60a5fa;   /* light blue */
                --aurora-5: #93c5fd;   /* lighter blue */

                --text-primary:   rgba(240, 248, 255, 0.95);
                --text-secondary: rgba(191, 219, 254, 0.75);
                --text-muted:     rgba(147, 197, 253, 0.50);

                --accent-glow: 0 0 40px rgba(59, 130, 246, 0.35);
                --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(191, 219, 254, 0.1);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'DM Sans', sans-serif;
                background: var(--bg-deep);
                color: var(--text-primary);
                min-height: 100vh;
                overflow-x: hidden;
            }

            h1, h2, h3, h4, .font-display { font-family: 'Sora', sans-serif; }

            /* ===== SCROLLBAR ===== */
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: var(--bg-deep); }
            ::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.3); border-radius: 3px; }
            ::-webkit-scrollbar-thumb:hover { background: rgba(14,165,233,0.5); }

            html { scroll-behavior: smooth; }
            #features, #howItWorks, #resources, #faq { scroll-margin-top: 110px; }

            /* ===== AURORA BACKGROUND ===== */
            .aurora-bg {
                position: fixed;
                inset: 0;
                z-index: 0;
                pointer-events: none;
                overflow: hidden;
            }
            .aurora-orb {
                position: absolute;
                border-radius: 50%;
                filter: blur(100px);
                opacity: 0.12;
                animation: drift 20s ease-in-out infinite;
            }
            .aurora-orb:nth-child(1) { width: 600px; height: 600px; background: var(--aurora-1); top: -200px; left: -100px; animation-delay: 0s; }
            .aurora-orb:nth-child(2) { width: 500px; height: 500px; background: var(--aurora-3); top: 30%; right: -150px; animation-delay: -7s; }
            .aurora-orb:nth-child(3) { width: 400px; height: 400px; background: var(--aurora-5); bottom: -100px; left: 30%; animation-delay: -14s; }
            .aurora-orb:nth-child(4) { width: 300px; height: 300px; background: var(--aurora-2); top: 60%; left: 10%; animation-delay: -3s; }

            @keyframes drift {
                0%, 100% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(40px, -30px) scale(1.05); }
                66% { transform: translate(-30px, 20px) scale(0.95); }
            }

            /* ===== GLASS COMPONENTS ===== */
            .glass {
                background: var(--glass-bg);
                backdrop-filter: blur(24px) saturate(1.5);
                -webkit-backdrop-filter: blur(24px) saturate(1.5);
                border: 1px solid var(--glass-border);
                box-shadow: var(--card-shadow);
            }
            .glass-2 {
                background: var(--glass-bg-2);
                backdrop-filter: blur(32px) saturate(1.8);
                -webkit-backdrop-filter: blur(32px) saturate(1.8);
                border: 1px solid var(--glass-border-2);
                box-shadow: var(--card-shadow);
            }
            .glass-light {
                background: var(--glass-bg-light);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--glass-border);
            }

            /* Shine line at top of glass card */
            .glass::before, .glass-2::before {
                content: '';
                position: absolute;
                top: 0; left: 10%; right: 10%;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(186,230,253,0.3), transparent);
                border-radius: 0 0 50% 50%;
            }
            .glass { position: relative; }
            .glass-2 { position: relative; }

            /* ===== BUTTONS ===== */
            .btn-primary {
                background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1e40af 100%);
                color: #fff;
                border: none;
                font-family: 'Sora', sans-serif;
                font-weight: 500;
                letter-spacing: 0.01em;
                transition: all 0.25s ease;
                position: relative;
                overflow: hidden;
            }
            .btn-primary::after {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
                opacity: 0;
                transition: opacity 0.2s;
            }
            .btn-primary:hover::after { opacity: 1; }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.4);
            }
            .btn-primary:active { transform: translateY(0); }

            .btn-glass {
                background: rgba(59, 130, 246, 0.15);
                border: 1px solid rgba(59, 130, 246, 0.4);
                color: #60a5fa;
                font-family: 'Sora', sans-serif;
                font-weight: 500;
                transition: all 0.2s ease;
            }
            .btn-glass:hover {
                background: rgba(59, 130, 246, 0.25);
                border-color: rgba(59, 130, 246, 0.6);
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            }

            .btn-ghost {
                background: transparent;
                border: 1px solid rgba(255,255,255,0.12);
                color: var(--text-secondary);
                font-family: 'DM Sans', sans-serif;
                transition: all 0.2s ease;
            }
            .btn-ghost:hover {
                background: rgba(255,255,255,0.06);
                border-color: rgba(255,255,255,0.2);
                color: var(--text-primary);
            }

            /* ===== NAV ===== */
            .nav-glass {
                background: rgba(10, 20, 40, 0.8);
                backdrop-filter: blur(30px) saturate(2);
                -webkit-backdrop-filter: blur(30px) saturate(2);
                border-bottom: 1px solid rgba(96, 165, 250, 0.15);
            }
            .nav-link {
                color: var(--text-secondary);
                font-family: 'DM Sans', sans-serif;
                font-size: 14px;
                padding: 7px 14px;
                border-radius: 8px;
                transition: all 0.2s;
                border: 1px solid transparent;
            }
            .nav-link:hover { color: var(--text-primary); background: rgba(59, 130, 246, 0.12); border-color: rgba(59, 130, 246, 0.2); }
            .nav-link.active { color: #93c5fd; background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.3); }

            /* ===== INPUTS ===== */
            .input-glass {
                background: rgba(10, 25, 60, 0.7);
                border: 1px solid rgba(96, 165, 250, 0.25);
                color: var(--text-primary);
                font-family: 'DM Sans', sans-serif;
                transition: all 0.2s;
            }
            .input-glass:focus {
                outline: none;
                border-color: rgba(59, 130, 246, 0.6);
                background: rgba(10, 25, 60, 0.9);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15), 0 0 20px rgba(59, 130, 246, 0.15);
            }
            .input-glass::placeholder { color: var(--text-muted); }

            /* ===== PROGRESS BARS ===== */
            .progress-container {
                position: relative;
                margin-top: 8px;
                height: 8px;
                background: rgba(255,255,255,0.1);
                border-radius: 4px;
                overflow: hidden;
            }
            .progress-bar {
                height: 100%;
                border-radius: 2px;
                transition: all 0.3s ease;
                width: 0%;
            }
            .progress-red { background: linear-gradient(90deg, #ef4444, #dc2626); }
            .progress-orange { background: linear-gradient(90deg, #f97316, #ea580c); }
            .progress-green { background: linear-gradient(90deg, #22c55e, #16a34a); }

            /* ===== MOOD BUTTONS ===== */
            .mood-btn {
                background: rgba(20, 50, 110, 0.6);
                border: 2px solid rgba(96, 165, 250, 0.15);
                transition: all 0.25s ease;
                cursor: pointer;
            }
            .mood-btn:hover {
                background: rgba(59, 130, 246, 0.2);
                border-color: rgba(59, 130, 246, 0.4);
                transform: translateY(-3px) scale(1.05);
                box-shadow: 0 8px 20px rgba(0,0,0,0.3), 0 0 15px rgba(59, 130, 246, 0.2);
            }
            .mood-btn.selected {
                background: rgba(59, 130, 246, 0.25);
                border-color: #60a5fa;
                box-shadow: 0 0 25px rgba(59, 130, 246, 0.4), inset 0 1px 0 rgba(191, 219, 254, 0.25);
                transform: translateY(-2px);
            }

            /* ===== CHAT ===== */
            .bubble-user {
                background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(37, 99, 235, 0.8));
                border: 1px solid rgba(96, 165, 250, 0.4);
            }
            .bubble-bot {
                background: rgba(20, 50, 110, 0.7);
                border: 1px solid rgba(96, 165, 250, 0.2);
            }

            /* ===== STAT CARDS ===== */
            .stat-card {
                background: rgba(20, 50, 110, 0.5);
                border: 1px solid rgba(96, 165, 250, 0.18);
                transition: all 0.25s;
            }
            .stat-card:hover { border-color: rgba(96, 165, 250, 0.35); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }

            /* ===== FEATURE CARDS ===== */
            .feature-card {
                background: var(--glass-bg);
                border: 1px solid var(--glass-border-2);
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }
            .feature-card::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.5), transparent);
                opacity: 0;
                transition: opacity 0.3s;
            }
            .feature-card:hover {
                border-color: rgba(96, 165, 250, 0.35);
                transform: translateY(-6px);
                box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(59, 130, 246, 0.15);
            }
            .feature-card:hover::before { opacity: 1; }

            /* ===== TAGS/BADGES ===== */
            .badge {
                background: rgba(59, 130, 246, 0.15);
                border: 1px solid rgba(59, 130, 246, 0.3);
                color: #93c5fd;
                font-family: 'DM Sans', sans-serif;
                font-size: 12px;
                letter-spacing: 0.05em;
                padding: 4px 14px;
                border-radius: 100px;
            }

            /* ===== GRADIENT TEXT ===== */
            .text-aurora {
                background: linear-gradient(135deg, #60a5fa, #3b82f6);
                -webkit-background-clip: text; background-clip: text;
                color: transparent;
            }
            .text-aurora-warm {
                background: linear-gradient(135deg, #93c5fd, #60a5fa);
                -webkit-background-clip: text; background-clip: text;
                color: transparent;
            }

            /* ===== DIVIDERS ===== */
            .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(56,189,248,0.2), transparent); }

            /* ===== STEP NUMBER ===== */
            .step-num {
                background: linear-gradient(135deg, #3b82f6, #2563eb);
                font-family: 'Sora', sans-serif;
                font-weight: 600;
            }

            /* ===== TESTIMONIAL ===== */
            .t-card {
                background: var(--glass-bg);
                border: 1px solid var(--glass-border-2);
                transition: all 0.3s;
            }
            .t-card:hover { border-color: rgba(56,189,248,0.25); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }

            /* ===== ANIMATIONS ===== */
            @keyframes fadeUp {
                from { opacity: 0; transform: translateY(24px); }
                to   { opacity: 1; transform: translateY(0); }
            }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes scaleIn {
                from { opacity: 0; transform: scale(0.92); }
                to   { opacity: 1; transform: scale(1); }
            }
            @keyframes float {
                0%,100% { transform: translateY(0); }
                50%     { transform: translateY(-8px); }
            }
            @keyframes pulse-glow {
                0%,100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
                50%     { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
            }
            @keyframes typing {
                0%,60%,100% { transform: translateY(0); opacity: 0.4; }
                30%          { transform: translateY(-5px); opacity: 1; }
            }
            @keyframes shimmer {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
            @keyframes glow-pulse {
                0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
                50% { opacity: 1; filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.8)); }
            }
            @keyframes slide-in-left {
                from { opacity: 0; transform: translateX(-40px); }
                to { opacity: 1; transform: translateX(0); }
            }
            @keyframes slide-in-right {
                from { opacity: 0; transform: translateX(40px); }
                to { opacity: 1; transform: translateX(0); }
            }
            @keyframes rotate-slow {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            @keyframes color-shift {
                0%, 100% { color: #3b82f6; }
                50% { color: #60a5fa; }
            }

            .anim-fadeUp   { animation: fadeUp 0.6s ease-out both; }
            .anim-fadeIn   { animation: fadeIn 0.4s ease-out both; }
            .anim-scaleIn  { animation: scaleIn 0.5s ease-out both; }
            .anim-float    { animation: float 4s ease-in-out infinite; }
            .anim-glow     { animation: glow-pulse 3s ease-in-out infinite; }
            .anim-slide-left { animation: slide-in-left 0.7s ease-out both; }
            .anim-slide-right { animation: slide-in-right 0.7s ease-out both; }

            .delay-1 { animation-delay: 0.1s; }
            .delay-2 { animation-delay: 0.2s; }
            .delay-3 { animation-delay: 0.3s; }
            .delay-4 { animation-delay: 0.4s; }
            .delay-5 { animation-delay: 0.5s; }

            /* ===== TYPING DOTS ===== */
            .dot {
                display: inline-block; width: 7px; height: 7px;
                border-radius: 50%; background: #38bdf8;
                animation: typing 1.2s ease-in-out infinite;
            }
            .dot:nth-child(2) { animation-delay: 0.2s; }
            .dot:nth-child(3) { animation-delay: 0.4s; }

            /* ===== GRID NOISE TEXTURE ===== */
            .noise::after {
                content: '';
                position: fixed; inset: 0; z-index: 1;
                pointer-events: none;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
                opacity: 0.3;
            }

            .profile-avatar {
                background: linear-gradient(135deg, #3b82f6, #2563eb);
            }

            /* Icon bg */
            .icon-bg-teal  { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
            .icon-bg-green { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
            .icon-bg-violet{ background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
            .icon-bg-cyan  { background: rgba(59, 130, 246, 0.15);  border: 1px solid rgba(59, 130, 246, 0.3);  }
        </style>
    </head>
    <body class="noise">

        <!-- Aurora background -->
        <div class="aurora-bg" aria-hidden="true">
            <div class="aurora-orb"></div>
            <div class="aurora-orb"></div>
            <div class="aurora-orb"></div>
            <div class="aurora-orb"></div>
        </div>

        <div id="app">
            <!-- Your existing content stays here -->

            <!-- ========== ADD NEW FEATURES BELOW YOUR EXISTING CONTENT ========== -->

            <!-- 1. Calming Toolbox Section -->
            <div class="glass rounded-2xl p-6 mb-8 anim-fadeUp delay-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-aurora">🧰 Calming Toolbox</h2>
                    <button id="emergencyCalmBtn" class="btn-primary px-4 py-2 rounded-xl text-sm">🆘 Emergency Calm</button>
                </div>
                <div id="toolboxContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <p class="text-text-muted col-span-2 text-center py-4">✨ Save calming exercises for quick access</p>
                </div>
            </div>

            <!-- 2. Enhanced AI Chat with Personas -->
            <div class="glass rounded-2xl p-6 mb-8 anim-fadeUp delay-2">
                <h2 class="text-2xl font-bold text-aurora mb-4">💬 AI Companion</h2>
                <div class="flex gap-2 mb-4">
                    <button class="persona-btn flex-1 py-2 rounded-lg font-semibold" data-persona="cbt" style="background: #4A90E2; color: white;">🧠 CBT Guide</button>
                    <button class="persona-btn flex-1 py-2 rounded-lg font-semibold" data-persona="warm" style="background: #6B7B8F; color: white;">🤗 Warm Listener</button>
                    <button class="persona-btn flex-1 py-2 rounded-lg font-semibold" data-persona="coach" style="background: #F4A261; color: white;">📋 Coach</button>
                </div>
                <div id="chatMessages" class="h-80 overflow-y-auto mb-4 p-4 rounded-xl" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);">
                    <div class="bubble-bot rounded-2xl p-3 mb-2 max-w-[85%]" style="background: rgba(20, 50, 110, 0.7);">👋 Hi! I'm here for you. How are you feeling today?</div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="chatInput" class="input-glass flex-1 px-4 py-2 rounded-xl" placeholder="Type your message...">
                    <button id="sendChatBtn" class="btn-primary px-6 py-2 rounded-xl">Send</button>
                </div>
            </div>

            <!-- 3. Digital Garden -->
            <div class="glass rounded-2xl p-6 mb-8 anim-fadeUp delay-3">
                <h2 class="text-2xl font-bold text-aurora mb-4">🌱 Your Garden</h2>
                <div id="gardenGrid" class="grid grid-cols-7 gap-2 mb-3">
                    <!-- 7 plants will be inserted here -->
                </div>
                <p id="streakText" class="text-center text-text-secondary text-sm">Loading your garden...</p>
            </div>

            <!-- 4. Wellness Summary -->
            <div class="glass rounded-2xl p-6 mb-8 anim-fadeUp delay-3">
                <h2 class="text-2xl font-bold text-aurora mb-4">📊 Weekly Wellness Summary</h2>
                <button id="generateSummaryBtn" class="btn-primary w-full py-2 rounded-xl mb-4">Generate Insights</button>
                <div id="summaryOutput" class="p-4 rounded-xl min-h-[120px] text-text-secondary" style="background: rgba(0,0,0,0.2);">
                    Click generate to see your weekly insights
                </div>
                <button id="exportSummaryBtn" class="btn-glass w-full mt-3 py-2 rounded-xl">📄 Export for Therapist</button>
            </div>

            <!-- 5. Crisis Support Banner (Hidden by default) -->
            <div id="crisisBanner" class="glass rounded-2xl p-6 mb-8" style="display: none; background: rgba(239,68,68,0.1); border-color: #ef4444;">
                <h3 class="text-xl font-bold mb-2" style="color: #ef4444;">🧘 You're not alone</h3>
                <p id="crisisMessage" class="text-text-primary mb-3"></p>
                <button id="crisisGroundingBtn" class="btn-primary w-full py-2 rounded-xl">Start Grounding Exercise</button>
                <p id="crisisLine" class="text-xs text-text-muted mt-2"></p>
            </div>

            <!-- 6. SOS Button (Floating) -->
            <button id="sosButton" class="fixed bottom-6 right-6 rounded-full p-4 shadow-2xl transition-all z-50" style="background: #E74C3C; color: white; animation: pulse 2s infinite;">
                🆘 SOS
            </button>
        </div>

        <noscript style="color:#ffdddd;background:rgba(0,0,0,0.2);display:block;padding:12px;border-radius:6px;margin:12px;">JavaScript is required for this app — enable JS and reload.</noscript>

        <script>console.log('MainPage HTML loaded');</script>
        <script type="module" src="../JS/MainPage.js?v=1"></script>
        <script>
            window.addEventListener('load', () => {
                if (window.initGoogleSignInMainPage) {
                    window.initGoogleSignInMainPage();
                }
            });
        </script>
    </body>
</html>
