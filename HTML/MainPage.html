<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Mental Health Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            /* === OCEAN GLASS THEME === */
            --bg-deep:       #030d17;
            --bg-mid:        #041526;
            --bg-surface:    #061d33;

            --glass-bg:      rgba(8, 40, 70, 0.45);
            --glass-bg-2:    rgba(5, 28, 52, 0.6);
            --glass-bg-light:rgba(15, 60, 100, 0.3);
            --glass-border:  rgba(56, 189, 248, 0.18);
            --glass-border-2:rgba(56, 189, 248, 0.10);
            --glass-shine:   rgba(186, 230, 253, 0.06);

            --aurora-1: #0ea5e9;   /* sky blue */
            --aurora-2: #06b6d4;   /* cyan */
            --aurora-3: #10b981;   /* emerald */
            --aurora-4: #3b82f6;   /* blue */
            --aurora-5: #8b5cf6;   /* violet accent */

            --text-primary:   rgba(224, 242, 254, 0.95);
            --text-secondary: rgba(147, 210, 244, 0.70);
            --text-muted:     rgba(100, 170, 210, 0.45);

            --accent-glow: 0 0 30px rgba(14, 165, 233, 0.25);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(186,230,253,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .font-display { font-family: 'Sora', sans-serif; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(14,165,233,0.5); }

        html { scroll-behavior: smooth; }
        #features, #howItWorks { scroll-margin-top: 110px; }

        /* ===== AURORA BACKGROUND ===== */
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .aurora-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            animation: drift 20s ease-in-out infinite;
        }
        .aurora-orb:nth-child(1) { width: 600px; height: 600px; background: var(--aurora-1); top: -200px; left: -100px; animation-delay: 0s; }
        .aurora-orb:nth-child(2) { width: 500px; height: 500px; background: var(--aurora-3); top: 30%; right: -150px; animation-delay: -7s; }
        .aurora-orb:nth-child(3) { width: 400px; height: 400px; background: var(--aurora-5); bottom: -100px; left: 30%; animation-delay: -14s; }
        .aurora-orb:nth-child(4) { width: 300px; height: 300px; background: var(--aurora-2); top: 60%; left: 10%; animation-delay: -3s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-30px, 20px) scale(0.95); }
        }

        /* ===== GLASS COMPONENTS ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }
        .glass-2 {
            background: var(--glass-bg-2);
            backdrop-filter: blur(32px) saturate(1.8);
            -webkit-backdrop-filter: blur(32px) saturate(1.8);
            border: 1px solid var(--glass-border-2);
            box-shadow: var(--card-shadow);
        }
        .glass-light {
            background: var(--glass-bg-light);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }

        /* Shine line at top of glass card */
        .glass::before, .glass-2::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(186,230,253,0.3), transparent);
            border-radius: 0 0 50% 50%;
        }
        .glass { position: relative; }
        .glass-2 { position: relative; }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%);
            color: #fff;
            border: none;
            font-family: 'Sora', sans-serif;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-primary:hover::after { opacity: 1; }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(14,165,233,0.4), 0 0 0 1px rgba(14,165,233,0.3);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-glass {
            background: rgba(14,165,233,0.1);
            border: 1px solid rgba(14,165,233,0.3);
            color: var(--aurora-1);
            font-family: 'Sora', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-glass:hover {
            background: rgba(14,165,233,0.2);
            border-color: rgba(14,165,233,0.5);
            box-shadow: 0 0 20px rgba(14,165,233,0.2);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.2);
            color: var(--text-primary);
        }

        /* ===== NAV ===== */
        .nav-glass {
            background: rgba(3, 13, 23, 0.75);
            backdrop-filter: blur(30px) saturate(2);
            -webkit-backdrop-filter: blur(30px) saturate(2);
            border-bottom: 1px solid rgba(56,189,248,0.12);
        }
        .nav-link {
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .nav-link:hover { color: var(--text-primary); background: rgba(14,165,233,0.08); border-color: rgba(14,165,233,0.15); }
        .nav-link.active { color: #7dd3fc; background: rgba(14,165,233,0.12); border-color: rgba(14,165,233,0.25); }

        /* ===== INPUTS ===== */
        .input-glass {
            background: rgba(4, 20, 40, 0.6);
            border: 1px solid rgba(56,189,248,0.2);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .input-glass:focus {
            outline: none;
            border-color: rgba(14,165,233,0.5);
            background: rgba(4, 20, 40, 0.8);
            box-shadow: 0 0 0 3px rgba(14,165,233,0.12), 0 0 20px rgba(14,165,233,0.1);
        }
        .input-glass::placeholder { color: var(--text-muted); }

        /* ===== PROGRESS BARS ===== */
        .progress-container {
            position: relative;
            margin-top: 8px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s ease;
            width: 0%;
        }
        .progress-red { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .progress-orange { background: linear-gradient(90deg, #f97316, #ea580c); }
        .progress-green { background: linear-gradient(90deg, #22c55e, #16a34a); }

        /* ===== MOOD BUTTONS ===== */
        .mood-btn {
            background: rgba(8, 40, 70, 0.5);
            border: 2px solid rgba(56,189,248,0.1);
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .mood-btn:hover {
            background: rgba(14,165,233,0.15);
            border-color: rgba(14,165,233,0.35);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), 0 0 15px rgba(14,165,233,0.15);
        }
        .mood-btn.selected {
            background: rgba(14,165,233,0.2);
            border-color: #38bdf8;
            box-shadow: 0 0 25px rgba(14,165,233,0.3), inset 0 1px 0 rgba(186,230,253,0.2);
            transform: translateY(-2px);
        }

        /* ===== CHAT ===== */
        .bubble-user {
            background: linear-gradient(135deg, rgba(14,165,233,0.8), rgba(6,182,212,0.8));
            border: 1px solid rgba(56,189,248,0.3);
        }
        .bubble-bot {
            background: rgba(8,40,70,0.6);
            border: 1px solid rgba(56,189,248,0.15);
        }

        /* ===== STAT CARDS ===== */
        .stat-card {
            background: rgba(8,40,70,0.4);
            border: 1px solid rgba(56,189,248,0.12);
            transition: all 0.25s;
        }
        .stat-card:hover { border-color: rgba(56,189,248,0.3); box-shadow: 0 0 20px rgba(14,165,233,0.1); }

        /* ===== FEATURE CARDS ===== */
        .feature-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border-2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56,189,248,0.4), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feature-card:hover {
            border-color: rgba(56,189,248,0.3);
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(14,165,233,0.12);
        }
        .feature-card:hover::before { opacity: 1; }

        /* ===== TAGS/BADGES ===== */
        .badge {
            background: rgba(14,165,233,0.12);
            border: 1px solid rgba(14,165,233,0.25);
            color: #7dd3fc;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 4px 14px;
            border-radius: 100px;
        }

        /* ===== GRADIENT TEXT ===== */
        .text-aurora {
            background: linear-gradient(135deg, #38bdf8, #34d399);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }
        .text-aurora-warm {
            background: linear-gradient(135deg, #7dd3fc, #a78bfa);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }

        /* ===== DIVIDERS ===== */
        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(56,189,248,0.2), transparent); }

        /* ===== STEP NUMBER ===== */
        .step-num {
            background: linear-gradient(135deg, #0ea5e9, #10b981);
            font-family: 'Sora', sans-serif;
            font-weight: 600;
        }

        /* ===== TESTIMONIAL ===== */
        .t-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border-2);
            transition: all 0.3s;
        }
        .t-card:hover { border-color: rgba(56,189,248,0.25); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-8px); }
        }
        @keyframes pulse-glow {
            0%,100% { box-shadow: 0 0 0 0 rgba(14,165,233,0.4); }
            50%     { box-shadow: 0 0 0 8px rgba(14,165,233,0); }
        }
        @keyframes typing {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30%          { transform: translateY(-5px); opacity: 1; }
        }

        .anim-fadeUp   { animation: fadeUp 0.6s ease-out both; }
        .anim-fadeIn   { animation: fadeIn 0.4s ease-out both; }
        .anim-scaleIn  { animation: scaleIn 0.5s ease-out both; }
        .anim-float    { animation: float 4s ease-in-out infinite; }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* ===== TYPING DOTS ===== */
        .dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; background: #38bdf8;
            animation: typing 1.2s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        /* ===== GRID NOISE TEXTURE ===== */
        .noise::after {
            content: '';
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .profile-avatar {
            background: linear-gradient(135deg, #0ea5e9, #10b981);
        }

        /* Icon bg */
        .icon-bg-teal  { background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.25); }
        .icon-bg-green { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.25); }
        .icon-bg-violet{ background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.25); }
        .icon-bg-cyan  { background: rgba(6,182,212,0.15);  border: 1px solid rgba(6,182,212,0.25);  }
    </style>
</head>
<body class="noise">

<!-- Aurora background -->
<div class="aurora-bg" aria-hidden="true">
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
</div>

<div id="app" style="position:relative;z-index:2;min-height:100vh;"></div>

<script src="../js/MainPage.js"></script>
</body>
</html>
