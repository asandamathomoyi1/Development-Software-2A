<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital Mental Health Support Platform - Login to access mental health resources and track your wellbeing">
    <title>Digital Mental Health Support Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="main-title">Digital Mental Health Support Platform</h1>
    <div class="login-card">
        <h2 class="welcome">Welcome back</h2>
        <p class="wellbeing">Your wellbeing matters</p>
        <p class="login-text">Login to your account</p>

        <form id="loginForm">
            <label for="username">Username</label>
            <div class="input-group">
                <span class="icon">👤</span>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <label for="password">Password</label>
            <div class="input-group">
                <span class="icon">🔑</span>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p><a href="forgot-password.html">Forgot your password?</a></p>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script src="login.js"></script>
</body>
</html>
