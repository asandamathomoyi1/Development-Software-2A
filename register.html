<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an account - Digital Mental Health Support Platform">
    <title>Create Account - Digital Mental Health Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="main-title">Digital Mental Health Support Platform</h1>
    <div class="login-card">
        <h2 class="welcome">Create Account</h2>
        <p class="login-text">Join our mental health community</p>

        <form id="registerForm">
            <label for="username">Username</label>
            <div class="input-group">
                <input type="text" id="username" name="username" required>
            </div>

            <label for="email">Email</label>
            <div class="input-group">
                <input type="email" id="email" name="email" required>
            </div>

            <label for="password">Password</label>
            <div class="input-group">
                
                <input type="password" id="password" name="password" required>
            </div>

            <label for="confirmPassword">Confirm Password</label>
            <div class="input-group">
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="index.html">Login here</a></p>
    </div>

    <script src="register.js"></script>
</body>
</html>
