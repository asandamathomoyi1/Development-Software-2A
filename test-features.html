<!DOCTYPE html><html><head><title>New Features</title><style>body{background:#0a1428;color:white;font-family:Arial;padding:20px}.card{background:rgba(255,255,255,0.1);padding:20px;margin:10px 0;border-radius:10px}button{background:#3b82f6;color:white;padding:10px;margin:5px;border:none;border-radius:5px;cursor:pointer}pre{background:#1e293b;padding:10px;border-radius:5px}</style></head><body><h1>✨ New Features Dashboard</h1><div class=card><h2>🌱 My Garden</h2><button onclick="fetch(`/api/garden/test-user`).then(r=>r.json()).then(d=>gardenResult.innerText=JSON.stringify(d,null,2))">Load Garden</button><pre id=gardenResult></pre></div><div class=card><h2>💬 AI Chat</h2><select id=persona><option value=cbt>CBT Therapist</option><option value=warm>Warm Listener</option><option value=coach>Coach</option></select><input id=msg placeholder="Type message..."><button onclick="fetch(`/api/chat-enhanced`,{method:`POST`,headers:{`Content-Type`:`application/json`},body:JSON.stringify({message:msg.value,persona:persona.value,userId:`test`})}).then(r=>r.json()).then(d=>chatResult.innerText=d.response||JSON.stringify(d))">Send</button><pre id=chatResult></pre></div><div class=card><h2>📝 Journal</h2><textarea id=journal rows=2 cols=50 placeholder="How are you feeling?"></textarea><br><input id=mood type=number placeholder="Mood 1-5"><button onclick="fetch(`/api/journal/save`,{method:`POST`,headers:{`Content-Type`:`application/json`},body:JSON.stringify({userId:`test`,text:journal.value,mood:mood.value})}).then(r=>r.json()).then(d=>journalResult.innerText=JSON.stringify(d,null,2))">Save Journal</button><pre id=journalResult></pre></div><div class=card><h2>📊 Wellness Summary</h2><button onclick="fetch(`/api/wellness/summary/test`,{method:`POST`}).then(r=>r.json()).then(d=>summaryResult.innerText=d.summary||JSON.stringify(d))">Get Weekly Summary</button><pre id=summaryResult></pre></div><div class=card><h2>🆘 Crisis Check</h2><button onclick="fetch(`/api/crisis/detect/test`,{method:`POST`}).then(r=>r.json()).then(d=>crisisResult.innerText=JSON.stringify(d,null,2))">Check Crisis Status</button><pre id=crisisResult></pre></div><script>const userId=`test-user-123`;</script></body></html>
